<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#534AB7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="하루관리">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>하루관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #f4f4f6; font-family: -apple-system, 'Noto Sans KR', BlinkMacSystemFont, sans-serif; }

    .app {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0,0,0,0.08);
    }

    /* ── HEADER ── */
    .header { padding: 14px 16px 10px; border-bottom: 0.5px solid #e5e5ea; background: #fff; }
    .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .date-sub  { font-size: 12px; color: #8e8e93; }
    .date-main { font-size: 20px; font-weight: 600; color: #1c1c1e; margin-top: 2px; }
    .date-lunar{ font-size: 11px; color: #8e8e93; margin-top: 2px; }
    .weather-block { text-align: right; }
    .weather-temp { font-size: 22px; font-weight: 500; color: #1c1c1e; }
    .weather-desc { font-size: 11px; color: #8e8e93; margin-top: 2px; }
    .weather-detail { font-size: 11px; color: #8e8e93; }
    .progress-bar { background: #e5e5ea; border-radius: 99px; height: 4px; margin-top: 10px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; background: #534AB7; transition: width .4s; }
    .prog-label { font-size: 11px; color: #8e8e93; margin-top: 4px; }

    /* ── TABS ── */
    .tabs { display: flex; border-bottom: 0.5px solid #e5e5ea; background: #fff; overflow-x: auto; flex-shrink: 0; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 0 0 auto; padding: 9px 8px; font-size: 11px; text-align: center;
      cursor: pointer; color: #8e8e93; border-bottom: 2px solid transparent;
      white-space: nowrap; display: flex; flex-direction: column; align-items: center;
      gap: 2px; min-width: 64px; transition: all .15s; -webkit-tap-highlight-color: transparent;
    }
    .tab.active { color: #534AB7; border-bottom-color: #534AB7; font-weight: 500; }
    .tab i { font-size: 17px; }

    /* ── CONTENT ── */
    .content { flex: 1; padding: 14px 14px 80px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* ── COMMON ── */
    .sec-title {
      font-size: 11px; font-weight: 600; color: #8e8e93;
      text-transform: uppercase; letter-spacing: .06em;
      margin: 14px 0 8px;
    }
    .sec-title:first-child { margin-top: 0; }

    .card { background: #fff; border: 0.5px solid #e5e5ea; border-radius: 12px; margin-bottom: 7px; overflow: hidden; }
    .card-row { display: flex; align-items: center; gap: 9px; padding: 10px 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .card-row:active { background: #f2f2f7; }

    .check-circle {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1.5px solid #c7c7cc; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: all .15s;
    }
    .done .check-circle { background: #534AB7; border-color: #534AB7; color: #fff; }
    .done .item-name { text-decoration: line-through; color: #8e8e93; }

    .item-emoji { font-size: 19px; flex-shrink: 0; }
    .item-info  { flex: 1; min-width: 0; }
    .item-name  { font-size: 14px; color: #1c1c1e; }
    .item-sub   { font-size: 11px; color: #8e8e93; margin-top: 1px; }

    .icon-btn {
      background: none; border: 0.5px solid #e5e5ea; border-radius: 8px;
      padding: 5px 7px; cursor: pointer; color: #8e8e93; font-size: 15px;
      display: flex; align-items: center; transition: all .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:active { background: #f2f2f7; }
    .icon-btn.del:active { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }

    .edit-form { padding: 0 12px 12px; border-top: 0.5px solid #e5e5ea; }
    .frow { display: flex; gap: 8px; align-items: center; margin-top: 9px; }
    .flabel { font-size: 11px; color: #8e8e93; width: 40px; flex-shrink: 0; }
    .finput, .fselect {
      flex: 1; border: 0.5px solid #e5e5ea; border-radius: 8px;
      padding: 7px 10px; font-size: 13px; background: #fff; color: #1c1c1e;
      font-family: inherit;
    }
    .finput:focus, .fselect:focus { outline: none; border-color: #534AB7; }
    textarea.finput { resize: none; min-height: 64px; line-height: 1.5; }

    .day-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .day-b {
      width: 32px; height: 32px; border-radius: 50%;
      border: 0.5px solid #e5e5ea; background: none; cursor: pointer;
      font-size: 11px; color: #8e8e93; font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .day-b.on { background: #534AB7; color: #fff; border-color: #534AB7; }

    .save-btn {
      background: #534AB7; color: #fff; border: none; border-radius: 8px;
      padding: 7px 16px; font-size: 13px; cursor: pointer; margin-top: 10px;
      font-family: inherit; -webkit-tap-highlight-color: transparent;
    }
    .save-btn:active { background: #3C3489; }

    .add-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px; border: 0.5px dashed #c7c7cc; border-radius: 10px;
      cursor: pointer; color: #8e8e93; font-size: 13px; background: none;
      width: 100%; margin-top: 4px; font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .add-btn:active { background: #f2f2f7; }

    .badge { font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 600; white-space: nowrap; }
    .bp { background: #EEEDFE; color: #3C3489; }
    .bt { background: #E1F5EE; color: #085041; }
    .ba { background: #FAEEDA; color: #633806; }
    .bc { background: #FAECE7; color: #712B13; }

    /* ── SCHEDULE ── */
    .sched-item { padding: 10px 12px; border: 0.5px solid #e5e5ea; border-radius: 10px; margin-bottom: 6px; border-left: 3px solid #534AB7; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .sched-item.sp { border-left-color: #1D9E75; }
    .sched-name { font-size: 13px; font-weight: 500; color: #1c1c1e; }
    .sched-meta { font-size: 11px; color: #8e8e93; margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .cal-notice { background: #E1F5EE; border-radius: 10px; padding: 10px 12px; font-size: 12px; color: #085041; display: flex; align-items: flex-start; gap: 8px; margin-bottom: 12px; }

    /* ── NOTICE ── */
    .notice-card { padding: 12px; background: #fff; border: 0.5px solid #e5e5ea; border-radius: 12px; margin-bottom: 7px; }
    .notice-title { font-size: 13px; font-weight: 500; color: #1c1c1e; line-height: 1.4; }
    .notice-org { font-size: 11px; color: #8e8e93; margin-top: 3px; }
    .notice-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 9px; padding-top: 8px; border-top: 0.5px solid #e5e5ea; }
    .dl { font-size: 11px; display: flex; align-items: center; gap: 3px; }
    .dl.soon { color: #BA7517; } .dl.urgent { color: #A32D2D; } .dl.ok { color: #3B6D11; }
    .new-dot { width: 6px; height: 6px; background: #E24B4A; border-radius: 50%; flex-shrink: 0; }
    .filter-row { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
    .chip { font-size: 11px; padding: 4px 10px; border-radius: 99px; border: 0.5px solid #e5e5ea; cursor: pointer; background: #fff; color: #8e8e93; font-family: inherit; -webkit-tap-highlight-color: transparent; }
    .chip.active { background: #EEEDFE; color: #3C3489; border-color: #AFA9EC; }
    .org-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; border: 0.5px solid #e5e5ea; border-radius: 10px; margin-bottom: 6px; }
    .org-name { font-size: 13px; color: #1c1c1e; }
    .org-url  { font-size: 11px; color: #8e8e93; margin-top: 1px; }

    /* ── EXPENSE ── */
    .exp-sum { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; margin-bottom: 12px; }
    .scard { background: #f2f2f7; border-radius: 10px; padding: 10px; text-align: center; }
    .sc-label { font-size: 10px; color: #8e8e93; }
    .sc-val { font-size: 16px; font-weight: 600; color: #1c1c1e; margin-top: 2px; }
    .sc-val.inc { color: #0F6E56; } .sc-val.exp { color: #993C1D; }
    .exp-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; border: 0.5px solid #e5e5ea; border-radius: 10px; margin-bottom: 6px; gap: 8px; }
    .exp-left { display: flex; align-items: center; gap: 9px; flex: 1; min-width: 0; }
    .exp-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .exp-name { font-size: 13px; color: #1c1c1e; }
    .exp-cat  { font-size: 11px; color: #8e8e93; margin-top: 1px; }
    .exp-memo { font-size: 11px; color: #8e8e93; font-style: italic; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }
    .exp-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .exp-amt { font-size: 13px; font-weight: 600; }
    .exp-amt.neg { color: #993C1D; } .exp-amt.pos { color: #0F6E56; }

    /* ── MEMO ── */
    .memo-card { background: #fff; border: 0.5px solid #e5e5ea; border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
    .memo-header { display: flex; align-items: center; gap: 8px; padding: 11px 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .memo-header:active { background: #f2f2f7; }
    .memo-date-badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: #EEEDFE; color: #3C3489; font-weight: 600; flex-shrink: 0; }
    .memo-preview { font-size: 12px; color: #8e8e93; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .memo-body { padding: 0 12px 12px; border-top: 0.5px solid #e5e5ea; }
    .memo-content { font-size: 13px; color: #1c1c1e; line-height: 1.7; padding-top: 10px; white-space: pre-wrap; }

    /* ── AI PANEL ── */
    .ai-panel { background: #f2f2f7; border-radius: 12px; padding: 12px; margin-bottom: 12px; border: 0.5px solid #e5e5ea; }
    .ai-header { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; font-size: 13px; font-weight: 600; color: #534AB7; }
    .ai-irow { display: flex; gap: 7px; }
    .ai-input { flex: 1; border: 0.5px solid #e5e5ea; border-radius: 8px; padding: 8px 10px; font-size: 13px; background: #fff; color: #1c1c1e; font-family: inherit; }
    .ai-input:focus { outline: none; border-color: #534AB7; }
    .ai-send { background: #534AB7; color: #fff; border: none; border-radius: 8px; padding: 8px 13px; cursor: pointer; font-size: 13px; font-family: inherit; }
    .ai-resp { margin-top: 9px; font-size: 13px; color: #3c3c43; line-height: 1.6; background: #fff; border-radius: 8px; padding: 10px; border: 0.5px solid #e5e5ea; }
    .ai-loading { display: flex; gap: 4px; align-items: center; padding: 8px 0; }
    .ai-loading span { width: 6px; height: 6px; background: #534AB7; border-radius: 50%; animation: bounce 1.2s infinite; }
    .ai-loading span:nth-child(2) { animation-delay: .2s; }
    .ai-loading span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(.6); opacity: .4; } 40% { transform: scale(1); opacity: 1; } }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn .2s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 20px 16px 36px; animation: slideUp .25s ease; max-height: 85vh; overflow-y: auto; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-title { font-size: 16px; font-weight: 600; color: #1c1c1e; margin-bottom: 16px; }
    .modal-btn { width: 100%; background: #534AB7; color: #fff; border: none; border-radius: 12px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px; font-family: inherit; }
    .modal-btn:active { background: #3C3489; }
    .modal-btn.cancel { background: #f2f2f7; color: #1c1c1e; margin-top: 8px; }
    .modal-label { font-size: 12px; color: #8e8e93; font-weight: 500; margin-bottom: 4px; display: block; }
    .modal-input { width: 100%; border: 0.5px solid #e5e5ea; border-radius: 10px; padding: 10px 12px; font-size: 14px; background: #fff; color: #1c1c1e; margin-bottom: 10px; font-family: inherit; }
    .modal-input:focus { outline: none; border-color: #534AB7; }
    textarea.modal-input { resize: none; min-height: 80px; line-height: 1.5; }
    .modal-select { width: 100%; border: 0.5px solid #e5e5ea; border-radius: 10px; padding: 10px 12px; font-size: 14px; background: #fff; color: #1c1c1e; margin-bottom: 10px; font-family: inherit; }
    .modal-select:focus { outline: none; border-color: #534AB7; }
    .modal-day-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .modal-day-b { width: 36px; height: 36px; border-radius: 50%; border: 0.5px solid #e5e5ea; background: none; cursor: pointer; font-size: 12px; color: #8e8e93; font-family: inherit; }
    .modal-day-b.on { background: #534AB7; color: #fff; border-color: #534AB7; }

    .empty-state { text-align: center; padding: 40px 0; color: #8e8e93; font-size: 13px; }
    .empty-state i { font-size: 36px; display: block; margin-bottom: 10px; color: #c7c7cc; }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-row">
      <div>
        <div class="date-sub" id="dateSub"></div>
        <div class="date-main" id="dateMain"></div>
        <div class="date-lunar" id="dateLunar"></div>
      </div>
      <div class="weather-block">
        <div class="weather-temp" id="wTemp">--°</div>
        <div class="weather-desc" id="wDesc">날씨 불러오는 중</div>
        <div class="weather-detail" id="wDetail"></div>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progBar" style="width:0%"></div></div>
    <div class="prog-label" id="progLabel"></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('routine',this)"><i class="ti ti-repeat"></i>루틴</div>
    <div class="tab" onclick="switchTab('schedule',this)"><i class="ti ti-calendar-event"></i>일정</div>
    <div class="tab" onclick="switchTab('notice',this)"><i class="ti ti-speakerphone"></i>공고</div>
    <div class="tab" onclick="switchTab('expense',this)"><i class="ti ti-wallet"></i>가계부</div>
    <div class="tab" onclick="switchTab('memo',this)"><i class="ti ti-notebook"></i>메모</div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="mainContent"></div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
    <div class="modal" id="modalBox"></div>
  </div>

</div>

<script>
// ── 날짜 / 음력 ──────────────────────────────────────────
const TODAY = new Date();
const DAY_KO = ['일','월','화','수','목','금','토'];
const MONTH_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

document.getElementById('dateSub').textContent = DAY_KO[TODAY.getDay()] + '요일';
document.getElementById('dateMain').textContent =
  TODAY.getFullYear() + '년 ' + MONTH_KO[TODAY.getMonth()] + ' ' + TODAY.getDate() + '일';

function getLunar(y, m, d) {
  const names = ['초하루','초이틀','초사흘','초나흘','초닷새','초엿새','초이레','초여드레','초아흐레','초열흘','열하루','열이틀','열사흘','열나흘','보름','열엿새','열이레','열여드레','열아흐레','스무날','스무하루','스무이틀','스무사흘','스무나흘','스물닷새','스물엿새','스물이레','스물여드레','스물아흐레','그믐'];
  const mnames = ['정월','이월','삼월','사월','오월','유월','칠월','팔월','구월','시월','동짓달','섣달'];
  const base = new Date(2025, 5, 20); // 양력 기준
  const target = new Date(y, m-1, d);
  const diff = Math.round((target - base) / 86400000);
  let lm = 5, ld = 24, rem = diff; // 음력 기준: 2025.5.24
  while (rem > 0) {
    const dim = lm % 2 === 1 ? 30 : 29;
    if (rem <= dim - ld) { ld += rem; rem = 0; }
    else { rem -= (dim - ld + 1); lm = lm % 12 + 1; ld = 1; }
  }
  while (rem < 0) {
    if (ld + rem >= 1) { ld += rem; rem = 0; }
    else { rem += ld; lm = lm === 1 ? 12 : lm - 1; ld = lm % 2 === 1 ? 30 : 29; }
  }
  return '음력 ' + mnames[(lm-1)%12] + ' ' + (ld <= 30 ? names[ld-1] : ld+'일');
}
document.getElementById('dateLunar').textContent =
  getLunar(TODAY.getFullYear(), TODAY.getMonth()+1, TODAY.getDate());

// ── 날씨 ──────────────────────────────────────────────────
async function fetchWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.978&current=temperature_2m,weathercode,relative_humidity_2m,wind_speed_10m&timezone=Asia/Seoul');
    const d = await r.json(); const c = d.current;
    const t = Math.round(c.temperature_2m);
    const wc = c.weathercode;
    const descs = [[0,'맑음','☀️'],[2,'대체로 맑음','🌤'],[3,'흐림','☁️'],[45,'안개','🌫'],[53,'이슬비','🌦'],[63,'비','🌧'],[73,'눈','🌨'],[82,'소나기','⛈'],[99,'뇌우','⛈']];
    let desc = '흐림', icon = '☁️';
    for (const [code, label, em] of descs) { if (wc <= code) { desc = label; icon = em; break; } }
    document.getElementById('wTemp').textContent = icon + ' ' + t + '°';
    document.getElementById('wDesc').textContent = desc;
    document.getElementById('wDetail').textContent = '습도 ' + c.relative_humidity_2m + '% · 바람 ' + Math.round(c.wind_speed_10m) + 'km/h';
  } catch(e) {
    document.getElementById('wTemp').textContent = '--°';
    document.getElementById('wDesc').textContent = '날씨 정보 없음';
  }
}
fetchWeather();

// ── 상태 ──────────────────────────────────────────────────
const EMOJIS = ['🧘','📚','📰','💧','🚶','📖','🏃','🍎','💊','✍️','🎯','🌙','☀️','🎵','🧹','✅'];
const DAY_LABELS = ['일','월','화','수','목','금','토'];

let state = {
  activeTab: 'routine',
  expandedEdit: null,
  expandedMemo: null,
  aiVisible: false,
  aiLoading: false,
  aiResponse: '',
  noticeFilter: '전체',
  routines: [
    {id:1,name:'아침 스트레칭',time:'07:00',emoji:'🧘',days:[1,2,3,4,5],done:false},
    {id:2,name:'영어 단어 20개',time:'08:00',emoji:'📚',days:[0,1,2,3,4,5,6],done:false},
    {id:3,name:'뉴스 읽기',time:'09:00',emoji:'📰',days:[1,2,3,4,5],done:true},
    {id:4,name:'물 2L 마시기',time:'종일',emoji:'💧',days:[0,1,2,3,4,5,6],done:false},
    {id:5,name:'저녁 산책 30분',time:'19:00',emoji:'🚶',days:[0,1,2,3,4,5,6],done:false},
    {id:6,name:'독서 20페이지',time:'22:00',emoji:'📖',days:[0,1,2,3,4,5,6],done:false},

// localStorage 저장/불러오기
function saveState() {
  try { localStorage.setItem('dailyAppState', JSON.stringify(state)); } catch(e) {}
}
function loadState() {
  try {
    const saved = localStorage.getItem('dailyAppState');
    if (saved) {
      const parsed = JSON.parse(saved);
      // 오늘 날짜가 바뀌면 루틴 done 초기화
      const savedDate = localStorage.getItem('dailyAppDate');
      const todayStr = TODAY.toISOString().slice(0,10);
      if (savedDate !== todayStr) {
        if (parsed.routines) parsed.routines.forEach(r => r.done = false);
        localStorage.setItem('dailyAppDate', todayStr);
      }
      state = { ...state, ...parsed };
    } else {
      localStorage.setItem('dailyAppDate', TODAY.toISOString().slice(0,10));
    }
  } catch(e) {}
}
loadState();

// ── 진행률 ───────────────────────────────────────────────
function updateProgress() {
  const td = TODAY.getDay();
  const trs = state.routines.filter(r => r.days.includes(td));
  const done = trs.filter(r => r.done).length;
  const total = trs.length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progBar').style.width = pct + '%';
  document.getElementById('progLabel').textContent = '오늘 루틴 ' + done + '/' + total + ' 완료 (' + pct + '%)';
}

function getDL(ds) { return Math.ceil((new Date(ds) - new Date()) / 86400000); }

function openModal(html) {
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalOverlay').style.display = 'flex';
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').style.display = 'none';
}
function closeModalDirect() {
  document.getElementById('modalOverlay').style.display = 'none';
}

function renderAiBox() {
  return `<div class="ai-panel">
    <div class="ai-header"><i class="ti ti-sparkles"></i> AI 생활 코치</div>
    <div class="ai-irow">
      <input class="ai-input" id="aiInput" placeholder="루틴 분석, 절약 방법 등..." onkeydown="if(event.key==='Enter')askAi()">
      <button class="ai-send" onclick="askAi()">전송</button>
    </div>
    ${state.aiLoading ? '<div class="ai-loading"><span></span><span></span><span></span></div>' : ''}
    ${state.aiResponse ? '<div class="ai-resp">' + state.aiResponse + '</div>' : ''}
  </div>`;
}

async function askAi() {
  const inp = document.getElementById('aiInput');
  const q = inp ? inp.value.trim() : ''; if (!q) return;
  inp.value = '';
  state.aiLoading = true; state.aiResponse = '';
  render();
  const summary = `루틴: ${state.routines.map(r=>r.name+(r.done?' (완료)':'')).join(', ')}. 지출: ${state.expenses.filter(e=>e.amount<0).map(e=>e.name+' '+Math.abs(e.amount)+'원').join(', ')}.`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', max_tokens: 1000,
        system: '당신은 사용자의 일상을 도와주는 AI 생활 코치입니다. 한국어로 친근하고 간결하게 200자 이내로 답변하세요.',
        messages: [{ role: 'user', content: '[현황] ' + summary + '\n[질문] ' + q }]
      })
    });
    const data = await res.json();
    state.aiResponse = data.content?.[0]?.text || '응답을 받지 못했어요.';
  } catch(e) { state.aiResponse = '연결 실패. 잠시 후 다시 시도해 주세요.'; }
  state.aiLoading = false;
  render();
}

function toggleDone(id) {
  const r = state.routines.find(r => r.id === id);
  if (r) { r.done = !r.done; saveState(); render(); }
}
function toggleEditRoutine(id) { state.expandedEdit = state.expandedEdit === id ? null : id; render(); }
function toggleAi() { state.aiVisible = !state.aiVisible; render(); }

function toggleDay(rid, day) {
  const r = state.routines.find(r => r.id === rid); if (!r) return;
  if (r.days.includes(day)) { if (r.days.length > 1) r.days = r.days.filter(d => d !== day); }
  else r.days = [...r.days, day].sort();
  render();
}
function saveRoutine(id) {
  const r = state.routines.find(r => r.id === id); if (!r) return;
  const n = document.getElementById('rn_'+id);
  const t = document.getElementById('rt_'+id);
  const e = document.getElementById('re_'+id);
  if (n) r.name = n.value.trim() || r.name;
  if (t) r.time = t.value.trim() || r.time;
  if (e) r.emoji = e.value;
  state.expandedEdit = null; saveState(); render();
}
function delRoutine(id) {
  if (!confirm('이 루틴을 삭제할까요?')) return;
  state.routines = state.routines.filter(r => r.id !== id);
  if (state.expandedEdit === id) state.expandedEdit = null;
  saveState(); render();
}

function confirmAddOrg() {
  const name = document.getElementById('mOName').value.trim();
  if (!name) { alert('기관 이름을 입력해 주세요'); return; }
  const url = document.getElementById('mOUrl').value.trim();
  state.watchOrgs.push({id:Date.now(),name,url});
  saveState(); closeModalDirect(); render();
}

// ── 가계부 탭 ─────────────────────────────────────────────
function renderExpense() {
  const inc = state.expenses.filter(e=>e.amount>0).reduce((a,b)=>a+b.amount,0);
  const exp = state.expenses.filter(e=>e.amount<0).reduce((a,b)=>a+b.amount,0);
  const bal = inc + exp;
  let html = `<div class="exp-sum">
    <div class="scard"><div class="sc-label">수입</div><div class="sc-val inc">+${inc.toLocaleString()}</div></div>
    <div class="scard"><div class="sc-label">지출</div><div class="sc-val exp">${exp.toLocaleString()}</div></div>
    <div class="scard"><div class="sc-label">잔액</div><div class="sc-val" style="color:${bal>=0?'#0F6E56':'#993C1D'}">${bal>=0?'+':''}${bal.toLocaleString()}</div></div>
  </div>`;
  html += '<div class="sec-title">오늘의 내역</div>';
  if (!state.expenses.length) html += `<div class="empty-state"><i class="ti ti-wallet"></i>내역이 없어요</div>`;
  state.expenses.forEach(e => {
    html += `<div class="exp-item">
      <div class="exp-left">
        <div class="exp-icon" style="background:${e.amount>0?'#E1F5EE':'#FAECE7'}">${e.emoji}</div>
        <div style="min-width:0">
          <div class="exp-name">${e.name}</div>
          <div class="exp-cat">${e.category}</div>
          ${e.memo?`<div class="exp-memo">${e.memo}</div>`:''}
        </div>
      </div>
      <div class="exp-right">
        <div class="exp-amt ${e.amount<0?'neg':'pos'}">${e.amount>0?'+':''}${e.amount.toLocaleString()}원</div>
        <button class="icon-btn del" onclick="delExpense(${e.id})"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  });
  html += `<button class="add-btn" onclick="openAddExpenseModal()"><i class="ti ti-plus"></i> 내역 추가</button>`;
  return html;
}
function delExpense(id) { state.expenses = state.expenses.filter(e=>e.id!==id); saveState(); render(); }
function openAddExpenseModal() {
  openModal(`<div class="modal-title">가계부 내역 추가</div>
    <label class="modal-label">항목 이름</label>
    <input class="modal-input" id="mEName" placeholder="예: 점심식사">
    <label class="modal-label">금액 (지출은 음수)</label>
    <input class="modal-input" id="mEAmt" type="number" placeholder="예: -9500 또는 30000">
    <label class="modal-label">카테고리</label>
    <select class="modal-select" id="mECat">
      <option>식비</option><option>교통</option><option>쇼핑</option><option>카페</option><option>수입</option><option>기타</option>
    </select>
    <label class="modal-label">메모 (선택)</label>
    <input class="modal-input" id="mEMemo" placeholder="세부 내용">
    <button class="modal-btn" onclick="confirmAddExpense()">추가</button>
    <button class="modal-btn cancel" onclick="closeModalDirect()">취소</button>
  `);
}
function confirmAddExpense() {
  const name = document.getElementById('mEName').value.trim();
  if (!name) { alert('이름을 입력해 주세요'); return; }
  const amt = parseInt(document.getElementById('mEAmt').value);
  if (isNaN(amt)) { alert('금액을 입력해 주세요'); return; }
  const cat = document.getElementById('mECat').value;
  const memo = document.getElementById('mEMemo').value.trim();
  const emap = {식비:'🍽️',교통:'🚌',쇼핑:'🛍️',카페:'☕',수입:'💰',기타:'💳'};
  state.expenses.push({id:Date.now(),name,category:cat,amount:amt,emoji:emap[cat]||'💳',memo});
  saveState(); closeModalDirect(); render();
}

// ── 메모 탭 ──────────────────────────────────────────────
function renderMemo() {
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div class="sec-title" style="margin:0">메모 · 일기</div>
    <button class="icon-btn" style="border-style:solid;gap:4px;padding:6px 10px;font-size:12px" onclick="openAddMemoModal()">
      <i class="ti ti-plus"></i> 작성
    </button>
  </div>`;
  if (!state.memos.length) {
    html += `<div class="empty-state"><i class="ti ti-notebook"></i>아직 메모가 없어요<br>오늘의 생각을 기록해보세요</div>`;
    return html;
  }
  [...state.memos].sort((a,b) => b.date.localeCompare(a.date)).forEach(m => {
    const isOpen = state.expandedMemo === m.id;
    html += `<div class="memo-card">
      <div class="memo-header" onclick="toggleMemo(${m.id})">
        <div class="memo-date-badge">${m.date.slice(5).replace('-','/')}</div>
        <div class="memo-preview">${m.content.replace(/\n/g,' ')}</div>
        <span class="badge ${m.type==='일기'?'bp':'ba'}" style="margin-left:4px">${m.type}</span>
        <button class="icon-btn del" style="margin-left:6px" onclick="event.stopPropagation();delMemo(${m.id})"><i class="ti ti-trash"></i></button>
      </div>
      ${isOpen ? `<div class="memo-body">
        <div class="memo-content">${m.content}</div>
        <button style="background:none;color:#534AB7;border:0.5px solid #AFA9EC;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;margin-top:10px;font-family:inherit" onclick="openEditMemoModal(${m.id})">
          <i class="ti ti-edit"></i> 수정
        </button>
      </div>` : ''}
    </div>`;
  });
  return html;
}
function toggleMemo(id) { state.expandedMemo = state.expandedMemo===id ? null : id; render(); }
function delMemo(id) {
  if (!confirm('이 메모를 삭제할까요?')) return;
  state.memos = state.memos.filter(m => m.id !== id);
  if (state.expandedMemo === id) state.expandedMemo = null;
  saveState(); render();
}
function openAddMemoModal() {
  const todayStr = TODAY.toISOString().slice(0,10);
  openModal(`<div class="modal-title">메모 · 일기 작성</div>
    <label class="modal-label">종류</label>
    <select class="modal-select" id="mMType"><option>일기</option><option>특이사항</option></select>
    <label class="modal-label">날짜</label>
    <input class="modal-input" id="mMDate" type="date" value="${todayStr}">
    <label class="modal-label">내용</label>
    <textarea class="modal-input" id="mMContent" placeholder="오늘 있었던 일, 생각, 특이사항을 자유롭게 적어보세요..." rows="5"></textarea>
    <button class="modal-btn" onclick="confirmAddMemo()">저장</button>
    <button class="modal-btn cancel" onclick="closeModalDirect()">취소</button>
  `);
}
function confirmAddMemo() {
  const content = document.getElementById('mMContent').value.trim();
  if (!content) { alert('내용을 입력해 주세요'); return; }
  const type = document.getElementById('mMType').value;
  const date = document.getElementById('mMDate').value || TODAY.toISOString().slice(0,10);
  state.memos.unshift({id:Date.now(),date,type,content});
  saveState(); closeModalDirect(); render();
}
function openEditMemoModal(id) {
  const m = state.memos.find(m=>m.id===id); if (!m) return;
  openModal(`<div class="modal-title">메모 수정</div>
    <label class="modal-label">종류</label>
    <select class="modal-select" id="mEMType"><option${m.type==='일기'?' selected':''}>일기</option><option${m.type==='특이사항'?' selected':''}>특이사항</option></select>
    <label class="modal-label">내용</label>
    <textarea class="modal-input" id="mEMContent" rows="5">${m.content}</textarea>
    <button class="modal-btn" onclick="confirmEditMemo(${id})">저장</button>
    <button class="modal-btn cancel" onclick="closeModalDirect()">취소</button>
  `);
}
function confirmEditMemo(id) {
  const m = state.memos.find(m=>m.id===id); if (!m) return;
  const content = document.getElementById('mEMContent').value.trim();
  if (!content) { alert('내용을 입력해 주세요'); return; }
  m.type = document.getElementById('mEMType').value;
  m.content = content;
  saveState(); closeModalDirect(); render();
}

// ── 렌더 ──────────────────────────────────────────────────
function render() {
  const c = document.getElementById('mainContent');
  if (state.activeTab === 'routine')  c.innerHTML = renderRoutine();
  else if (state.activeTab === 'schedule') c.innerHTML = renderSchedule();
  else if (state.activeTab === 'notice')   c.innerHTML = renderNotice();
  else if (state.activeTab === 'expense')  c.innerHTML = renderExpense();
  else if (state.activeTab === 'memo')     c.innerHTML = renderMemo();
  updateProgress();
}

function switchTab(tab, el) {
  state.activeTab = tab;
  state.expandedEdit = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

render();

// Service Worker 등록 (PWA 오프라인 지원)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
